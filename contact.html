<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Indian Classes Sikar</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>

    <header></header>
    <nav></nav>

    <!-- Main Content -->
    <div class="container">
        <h2>Contact Us</h2>
        
        <div class="contact-info">
            <h3>Get in Touch</h3>
            <p><strong>Address:</strong>Indian Classes Sikar</p>
            <p><strong>Phone:</strong> +91-XXXXXXXXXX</p>
            <p><strong>Email:</strong> Indian Classes Sikar@example.com</p>
            <p><strong>Office Hours:</strong> Monday to Saturday (9:00 AM - 5:00 PM)</p>
        </div>

        <h3>Send us a Message</h3>
        <p>Fill out the form below and we will get back to you as soon as possible.</p>
        
        <form id="contactForm">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter your email ID" required>

            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="What is this regarding?">

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>

            <input type="submit" id="submitBtn" value="Send Message">
        </form>
    </div>

    <div class="bottom-space"></div>

    <footer></footer>
    <script src="components.js"></script>
    <script src="script.js"></script>
</body>
</html>
