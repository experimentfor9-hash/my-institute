<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Indian Classes Sikar</title>
    <link rel="stylesheet" href="style.css">
    <style>
        input[type="submit"]:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <header></header>
    <nav></nav>

    <!-- Main Content -->
    <div class="container">
        <h2>Contact Us</h2>
        
        <div class="contact-info">
            <h3>Get in Touch</h3>
            <p><strong>Address:</strong> Indian Classes Sikar</p>
            <p><strong>Phone:</strong> +91-XXXXXXXXXX</p>
            <p><strong>Email:</strong> Indian Classes Sikar@example.com</p>
            <p><strong>Office Hours:</strong> Monday to Saturday (9:00 AM - 5:00 PM)</p>
        </div>

        <h3>Send us a Message</h3>
        <p>Fill out the form below and we will get back to you as soon as possible.</p>
        
        <form id="contactForm">
    <div>
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Enter your full name" required>
    </div>
    
    <div>
        <label>Email Address</label>
        <input type="email" name="email" placeholder="Enter your email ID" required>
    </div>
    
    <div>
        <label>Subject</label>
        <input type="text" name="subject" placeholder="What is this regarding?">
    </div>
    
    <div>
        <label>Message</label>
        <textarea name="message" rows="4" placeholder="Write your message here..." required></textarea>
    </div>

    <input type="submit" value="Send Message">
        </form>
        
        
        <p id="formStatus" style="text-align: center; font-weight: bold; margin-top: 15px; font-size: 16px;"></p>
    </div>

    <div class="bottom-space"></div>

    <footer></footer>
    <script src="components.js"></script>
    
    <script>
        const contactForm = document.getElementById('contactForm');
        const formStatus = document.getElementById('formStatus');
        const submitBtn = document.getElementById('submitBtn');
        
        const API_URL = "https://script.google.com/macros/s/AKfycbzLYgQBSKtEJLI7eTpjiO-RFf32NeLhOWqkWOCDXoAnznMSsTyZMh1M5om_txKZ9UE/exec";

        contactForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            submitBtn.value = "Sending Message... ⏳";
            submitBtn.disabled = true;
            formStatus.innerText = "";

            let formData = new FormData(contactForm);

            fetch(API_URL, { method: 'POST', body: formData })
                .then(response => response.text())
                .then(data => {
                    formStatus.innerText = "✅ Message sent successfully! We will contact you soon.";
                    formStatus.style.color = "green";
                    contactForm.reset();
                    submitBtn.value = "Send Message";
                    submitBtn.disabled = false;
                })
                .catch(error => {
                    formStatus.innerText = "❌ Error sending message. Please check your internet or try again.";
                    formStatus.style.color = "red";
                    submitBtn.value = "Send Message";
                    submitBtn.disabled = false;
                });
        });
    </script>
</body>
</html>
